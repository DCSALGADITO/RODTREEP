<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROADTREEP - Album Photo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body style="overflow: hidden; margin: 0; padding: 0;">

    <section id="album" class="album-section fullscreen-active" style="height: 100vh;">
        <a href="index.html" class="exit-album-btn" style="z-index: 999999;">Quitter l'exploration</a>
        <h2 class="album-title">ALBUM PHOTO</h2>
        <div class="album-wrapper" id="album-wrapper">
            <div class="infinite-canvas" id="infinite-canvas">
                <div class="add-photo-placeholder" id="add-photo-placeholder">
                    <label for="photo-upload" class="add-photo-btn">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </label>
                    <input type="file" id="photo-upload" accept="image/*, video/*" multiple style="display: none;">
                </div>
            </div>
        </div>
    </section>

    <script src="supabase.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
